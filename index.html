<!DOCTYPE html>
<html>
<head>
<title>NJS Earn App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
text-align:center;
}

.container{
margin-top:60px;
background:white;
color:black;
padding:25px;
border-radius:15px;
width:320px;
margin-left:auto;
margin-right:auto;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.logo{
width:120px;
margin-bottom:15px;
}

.balance{
font-size:20px;
margin:10px 0;
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:14px;
}

.earn{background:#28a745;color:white;}
.withdraw{background:#ffc107;color:black;}
.admin{background:#dc3545;color:white;}
.save{background:#007bff;color:white;}

input{
padding:8px;
margin:5px;
width:90%;
border-radius:6px;
border:1px solid #ccc;
}

.hidden{display:none;}

</style>
</head>
<body>

<div class="container" id="userPanel">

<img src="NJS_logo.png" class="logo">

<h3>User Dashboard</h3>

<div class="balance">
Balance: <span id="balance">0</span> Coins
</div>

<button class="earn" onclick="earn()">Watch Ad & Earn</button>
<button class="withdraw" onclick="withdraw()">Withdraw</button>

<p id="message"></p>

<hr>

<button class="admin" onclick="showAdmin()">Admin Login</button>

</div>

<div class="container hidden" id="adminPanel">

<h3>Admin Dashboard</h3>

<input type="password" id="adminPass" placeholder="Admin Password">

<br>

<h4>Set Percentage (Example: 5/3)</h4>
<input type="text" id="percent" placeholder="5/3">
<br>
<button class="save" onclick="savePercent()">Save Percentage</button>

<br><br>

<button class="admin" onclick="resetAll()">Reset All Balance</button>
<br>
<button onclick="backUser()">Back</button>

<p id="adminMsg"></p>

</div>

<script>

let coins = localStorage.getItem("coins") || 0;
let percent = localStorage.getItem("percent") || "5/3";

coins=parseInt(coins);
document.getElementById("balance").innerText=coins;

function earn(){

let parts=percent.split("/");
let total=parseInt(parts[0]);
let userShare=parseInt(parts[1]);

let earnAmount = (10 * userShare) / total;

coins += earnAmount;

localStorage.setItem("coins",coins);
document.getElementById("balance").innerText=coins;

alert("Ad Watched 🎉 Coins Added");
}

function withdraw(){

if(coins>=100){
document.getElementById("message").innerText="Withdraw Request Sent to Admin ✅";
coins=0;
localStorage.setItem("coins",coins);
document.getElementById("balance").innerText=coins;
}else{
document.getElementById("message").innerText="Minimum 100 Coins Required ❌";
}

}

function showAdmin(){
document.getElementById("userPanel").classList.add("hidden");
document.getElementById("adminPanel").classList.remove("hidden");
}

function backUser(){
document.getElementById("adminPanel").classList.add("hidden");
document.getElementById("userPanel").classList.remove("hidden");
}

function savePercent(){

let pass=document.getElementById("adminPass").value;

if(pass==="njs123"){
let newPercent=document.getElementById("percent").value;
localStorage.setItem("percent",newPercent);
document.getElementById("adminMsg").innerText="Percentage Updated ✅";
}else{
document.getElementById("adminMsg").innerText="Wrong Password ❌";
}

}

function resetAll(){

let pass=document.getElementById("adminPass").value;

if(pass==="njs123"){
coins=0;
localStorage.setItem("coins",coins);
document.getElementById("balance").innerText=coins;
document.getElementById("adminMsg").innerText="All Balance Reset ✅";
}else{
document.getElementById("adminMsg").innerText="Wrong Password ❌";
}

}

</script>

</body>
</html>
