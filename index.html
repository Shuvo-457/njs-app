<!DOCTYPE html>
<html>
<head>
  <title>NJS Earn App</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f4f4;
    }
    .box {
      margin-top: 50px;
      background: white;
      padding: 30px;
      border-radius: 10px;
      display: inline-block;
      box-shadow: 0 0 10px #ccc;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      margin: 5px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .admin {
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>NJS Earn App</h2>
  <h3>Balance: <span id="balance">0</span> Coins</h3>
  <button onclick="earn()">Earn Coins</button>

  <div class="admin">
    <h4>Admin Panel</h4>
    <input type="password" id="adminPass" placeholder="Enter Admin Password">
    <button onclick="resetBalance()">Reset Balance</button>
  </div>
</div>

<script>
  let balance = localStorage.getItem("balance") || 0;
  document.getElementById("balance").innerText = balance;

  function earn() {
    balance = parseInt(balance) + 10;
    localStorage.setItem("balance", balance);
    document.getElementById("balance").innerText = balance;
  }

  function resetBalance() {
    let pass = document.getElementById("adminPass").value;

    if (pass === "njs123") {
      balance = 0;
      localStorage.setItem("balance", balance);
      document.getElementById("balance").innerText = balance;
      alert("Balance Reset Successful!");
    } else {
      alert("Wrong Password!");
    }
  }
</script>

</body>
</html>
