<!DOCTYPE html>
<html>
<head>
    <title>NJS Earn</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
            color: white;
            text-align: center;
        }

        header {
            padding: 20px;
            background: #0d1b2a;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .card {
            background: #1b263b;
            margin: 20px;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
        }

        .balance {
            font-size: 28px;
            color: #00ff99;
            margin-top: 10px;
        }

        button {
            padding: 12px 25px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .earn {
            background: #0077ff;
            color: white;
        }

        .withdraw {
            background: #ff3c3c;
            color: white;
        }

        footer {
            margin-top: 30px;
            padding: 15px;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

<header>
    NJS EARNING SYSTEM
</header>

<div class="card">
    <h2>Your Balance</h2>
    <div class="balance">৳ 0.00</div>
</div>

<div class="card">
    <h2>Start Earning</h2>
    <button class="earn">Earn Coins</button>
    <button class="withdraw">Withdraw</button>
</div>

<footer>
    © 2026 NJS | Trusted Online Earning Platform
</footer>

</body>
</html>
