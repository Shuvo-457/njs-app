<!DOCTYPE html>
<html>
<head>
  <title>NJS Earn App</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f4f4;
    }
    .box {
      margin-top: 100px;
      background: white;
      padding: 30px;
      border-radius: 10px;
      display: inline-block;
      box-shadow: 0 0 10px #ccc;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>NJS Earn App</h2>
  <h3>Balance: <span id="balance">0</span> Coins</h3>
  <button onclick="earn()">Earn Coins</button>
</div>

<script>
  let balance = localStorage.getItem("balance") || 0;
  document.getElementById("balance").innerText = balance;

  function earn() {
    balance = parseInt(balance) + 10;
    localStorage.setItem("balance", balance);
    document.getElementById("balance").innerText = balance;
  }
</script>

</body>
</html>
